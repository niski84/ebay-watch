name: Morning Poll

on:
  schedule:
    # 8:00 AM US Central (UTC-5 standard / UTC-6 daylight)
    # Using 13:00 UTC to hit ~8am CT year-round (splits the difference)
    - cron: '0 13 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger poll
        env:
          POLL_URL: ${{ secrets.EBAY_WATCH_URL }}
          AUTH_USER: ${{ secrets.EBAY_WATCH_USER }}
          AUTH_PASS: ${{ secrets.EBAY_WATCH_PASS }}
        run: |
          if [ -z "$POLL_URL" ]; then
            echo "ERROR: EBAY_WATCH_URL secret is not set."
            echo "Add it in: GitHub repo → Settings → Secrets and variables → Actions"
            echo "Value should be the full URL to your deployment, e.g.:"
            echo "  https://ebay-watch.fly.dev"
            echo "  http://your-nas-ip:8080"
            exit 1
          fi

          # Build auth flag only if credentials are provided
          AUTH_FLAG=""
          if [ -n "$AUTH_USER" ] && [ -n "$AUTH_PASS" ]; then
            AUTH_FLAG="-u ${AUTH_USER}:${AUTH_PASS}"
          fi

          echo "Sending poll request to ${POLL_URL}/api/poll ..."

          # --connect-timeout: give Fly.io / cold-start machines time to wake up
          # --max-time: poll can run for up to 25 minutes (Playwright + gallery enrichment)
          # --retry / --retry-delay: handle transient 503s during cold start
          curl -fsSX POST \
            ${AUTH_FLAG} \
            --connect-timeout 60 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 15 \
            --retry-all-errors \
            "${POLL_URL}/api/poll?async=1"
        timeout-minutes: 30
